name: FiscoControl CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  # ── Job 1: Qualidade de Código ───────────────────────────────
  lint-and-test:
    name: Lint & Testes
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fiscocontrol-app

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: fiscocontrol-app/package-lock.json

      - name: Instalar dependências
        run: npm ci --legacy-peer-deps

      - name: Gerar Prisma Client
        run: npx prisma generate

      - name: Lint
        run: npm run lint --if-present

      - name: Build de verificação
        run: npm run build
        env:
          DATABASE_URL: "postgresql://test:test@localhost:5432/test"
          NEXTAUTH_SECRET: "ci-test-secret-value"
          NEXTAUTH_URL: "http://localhost:3000"
          WHATSAPP_API_URL: "http://localhost:8080"
          WHATSAPP_API_KEY: "test-key"

  # ── Job 2: Build e Push da Imagem Docker ──────────────────────
  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Login no Docker Hub (ou GHCR)
        uses: docker/login-action@v3
        with:
          # Para GHCR (GitHub Container Registry):
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extrair metadados
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/fiscocontrol-app
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build e Push da Imagem
        uses: docker/build-push-action@v5
        with:
          context: ./fiscocontrol-app
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── Job 3: Deploy para Produção ───────────────────────────────
  deploy:
    name: Deploy para Produção
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_SERVER_IP }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/fiscocontrol
            git pull origin main
            bash deploy.sh --update
            echo "✅ Deploy concluído com sucesso!"
