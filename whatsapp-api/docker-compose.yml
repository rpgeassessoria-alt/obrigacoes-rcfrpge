version: '3.8'

services:
  evolution-api:
    image: atendare/evolution-api:latest
    container_name: evolution-api
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=http://localhost:8080
      - DOCKER_RESTART_POLICY=always
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=fiscocontrol_secret_key
      - DEFAULT_CONNECTION_RECONNECT=true
      - STORE_MESSAGES=true
      - STORE_MESSAGE_UP=true
      - CLEAN_STORE_CLEANUP_INTERVAL=60
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://admin:admin_password@postgres:5432/evolution_db
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379/1
    networks:
      - evolution_net
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:15
    container_name: evolution_postgres
    restart: always
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin_password
      - POSTGRES_DB=evolution_db
    ports:
      - "5432:5432"
    networks:
      - evolution_net
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: evolution_redis
    restart: always
    networks:
      - evolution_net

networks:
  evolution_net:
    driver: bridge

volumes:
  postgres_data:
